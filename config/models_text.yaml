# Text LLM ensemble for ChaosNLI (Phase 1.2 — scaffolded, run after CIFAR-10H).
# Same vLLM instance, swap models sequentially. 3-class JSON output:
#   {"entailment": float, "neutral": float, "contradiction": float} + rationale.
# Soft labels via token logprobs over single-token class markers (A/B/C), mirroring
# the vision path. Llama-3 is gated — accept the license + `huggingface-cli login`.

runner:
  max_model_len: 4096
  gpu_memory_utilization: 0.92
  max_num_seqs: 8
  enforce_eager: true
  trust_remote_code: true

classes: [entailment, neutral, contradiction]   # letters A,B,C

models:                       # local smoke (small)
  - {key: qwen2_5_3b,  id: Qwen/Qwen2.5-3B-Instruct,        quantization: null}
  - {key: llama3_2_3b, id: meta-llama/Llama-3.2-3B-Instruct, quantization: null}
  - {key: mistral_7b,  id: mistralai/Mistral-7B-Instruct-v0.3, quantization: awq}

profiles:
  hpc:                        # full 7-8B heterogeneous ensemble (per the brief)
    - {key: llama3_8b,  id: meta-llama/Meta-Llama-3-8B-Instruct, quantization: null}
    - {key: qwen2_5_7b, id: Qwen/Qwen2.5-7B-Instruct,            quantization: null}
    - {key: mistral_7b, id: mistralai/Mistral-7B-Instruct-v0.3,  quantization: null}
